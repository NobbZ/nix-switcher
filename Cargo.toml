[package]
name = "switcher"
version = "0.2.4"
edition = "2021"
# if-let is introduced in 1.65 https://doc.rust-lang.org/rust-by-example/flow_control/let_else.html
rust-version = "1.65"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
anyhow = "1.0.70"
clap = { version = "4.1.13", features = ["derive", "env"] }
clap_complete = "4.2.0"
futures = "0.3.28"
graphql_client = { version = "0.12.0", features = ["reqwest"] }
reqwest = "0.11.16"
serde = "1.0.159"
serde_json = "1.0.95"
serde_yaml = "0.9.19"
tokio = { version = "1.27.0", features = ["full"] }
tracing = "0.1.37"
tracing-futures = "0.2.5"
tracing-subscriber = { version = "0.3.16", features = ["json"] }
url = "2.3.1"
